# content of: tox.ini , put in same dir as setup.py
[tox]
envlist=
    flake8,
    code,
    docs,
    docs-linkcheck,

minversion = 4.0
skipsdist = True

# Shared defaults for the code/test/flake8 envs. Docs envs do NOT
# inherit usedevelop, install_command, or the project runtime deps;
# they are configured independently below so docs builds run with
# stock tox/pip behaviour (matching the pattern used by every other
# O-RAN-SC repository that builds documentation).
[testenv]
basepython = python3
setenv =
        VIRTUAL_ENV={envdir}
allowlist_externals = bash, flake8, pytest, pip

[testenv:clm]
# use pip to report dependencies with versions
allowlist_externals = sh
commands = sh -c 'pip freeze > requirements.txt'

[testenv:flake8]
usedevelop = True
install_command = pip install -U {opts} {packages}
deps = -r{toxinidir}/requirements.txt
       -r{toxinidir}/requirements-test.txt
commands =
    flake8 o2ims
    flake8 o2dms
    flake8 o2common

[testenv:code]
usedevelop = True
install_command = pip install -U {opts} {packages}
deps = -r{toxinidir}/requirements.txt
       -r{toxinidir}/requirements-test.txt
setenv =
        O2APP_CONFIG=configs/o2app.conf
        ALARM_YAML=configs/alarm.yaml
commands =
    pytest tests/unit

[testenv:nosetests]
usedevelop = True
install_command = pip install -U {opts} {packages}
deps = -r{toxinidir}/requirements.txt
       -r{toxinidir}/requirements-test.txt
commands =
    pytest tests/unit


# Docs envs are deliberately self-contained: they do not pull in the
# project's runtime requirements and they use stock tox dep handling
# (no usedevelop, no custom install_command), which keeps allowlist
# noise to a minimum and matches the pattern used by every other
# O-RAN-SC repository that builds documentation.
[testenv:docs]
basepython = python3
deps = -r{toxinidir}/docs/requirements-docs.txt
allowlist_externals = echo
commands =
    sphinx-build -W -b html -n -d {envtmpdir}/doctrees ./docs/ {toxinidir}/docs/_build/html
    echo "Generated docs available in {toxinidir}/docs/_build/html"

[testenv:docs-linkcheck]
basepython = python3
deps = -r{toxinidir}/docs/requirements-docs.txt
commands = sphinx-build -W -b linkcheck -d {envtmpdir}/doctrees ./docs/ {toxinidir}/docs/_build/linkcheck

[flake8]
extend-ignore = E231,F401